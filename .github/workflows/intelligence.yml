name: AI Intelligence Feed

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # intelligence.db 복원 (중복 발송 방지)
      - name: Restore intelligence.db cache
        uses: actions/cache/restore@v4
        with:
          path: intelligence.db
          key: intelligence-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            intelligence-db-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intelligence feed
        env:
          DISCORD_INTELLIGENCE_WEBHOOK_URL: ${{ secrets.DISCORD_INTELLIGENCE_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main_intelligence.py

      # intelligence.db 저장
      - name: Save intelligence.db cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: intelligence.db
          key: intelligence-db-${{ runner.os }}-${{ github.run_id }}
